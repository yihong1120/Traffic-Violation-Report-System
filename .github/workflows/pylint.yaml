name: pylint

on:
  push:
    branches:
      - master
      - workflows

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint-django
          pip install -r requirements.txt

#      - name: Run Tests
#        run: |
#          python manage.py test

      - name: Run Pylint
        run: |
          shopt -s globstar && pylint --load-plugins pylint_django --django-settings-module=./TrafficViolationReport **/*.py


